services:
  db:
    image: mongo:latest
    volumes:
      - mongo-data:/data/db
      - ./init-db.js:/docker-entrypoint-initdb.d/init-db.js:ro

  app:
    image: ${DOCKER_USERNAME}/apple-web-task:${IMAGE_TAG:-latest}
    build: ./app
    deploy:
      replicas: 2
    depends_on:
      - db
    environment:
      - MONGO_URI=mongodb://db:27017/fruitdb

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

volumes:
  mongo-data: